<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>芋芋</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(135deg,
                    #111,
                    #222,
                    #111);

            display: flex;
            flex-direction: column;
            align-items: center;

            color: white;
            font-family: sans-serif;
        }

        /* タイトル */

        h1 {

            margin: 20px 10px;

            text-align: center;

            font-size:
                clamp(2rem,
                    8vw,
                    5rem);

            font-weight: bold;

            animation:
                rainbow 3s linear infinite;

            text-shadow:
                0 0 10px currentColor,
                0 0 20px currentColor,
                0 0 40px currentColor;
        }

        .imo-title {
            text-align: center;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: bold;
        }

        .imo-title span {
            display: inline-block;

            animation:
                rainbow 3s linear infinite,
                bounce 1s ease-in-out infinite;

            text-shadow:
                0 0 10px currentColor,
                0 0 20px currentColor,
                0 0 40px currentColor;
        }

        .imo-title span:nth-child(1) {
            animation-delay: 0s;
        }

        .imo-title span:nth-child(2) {
            animation-delay: .15s;
        }

        .imo-title span:nth-child(3) {
            animation-delay: .30s;
        }

        .imo-title span:nth-child(4) {
            animation-delay: .45s;
        }

        @keyframes bounce {

            0%,
            100% {
                transform:
                    translateY(0);
            }

            50% {
                transform:
                    translateY(-25px) rotate(-8deg);
            }
        }


        @keyframes rainbow {

            0% {
                color: #ff0000;
            }

            16% {
                color: #ff8800;
            }

            33% {
                color: #ffff00;
            }

            50% {
                color: #00ff00;
            }

            66% {
                color: #00ffff;
            }

            83% {
                color: #0000ff;
            }

            100% {
                color: #ff00ff;
            }
        }

        .video-card {
            display: flex;

            flex-direction: column;
            
            align-items: center;

            width: min(95%, 1000px);

            margin: 30px auto;

            padding: 15px;

            background:
                linear-gradient(135deg,
                    rgba(255, 255, 255, .15),
                    rgba(255, 255, 255, .05));

            border: 3px solid rgba(255,
                    255,
                    255,
                    .2);

            border-radius: 25px;

            backdrop-filter: blur(10px);

            box-shadow:
                0 0 20px rgba(255, 0, 255, .4),
                0 0 40px rgba(0, 255, 255, .3),
                0 0 60px rgba(255, 255, 0, .2);

            transition:
                transform .3s,
                box-shadow .3s;
        }

        .video-card:hover {

            transform:
                translateY(-8px) scale(1.02);

            box-shadow:
                0 0 30px rgba(255, 0, 255, .7),
                0 0 60px rgba(0, 255, 255, .5),
                0 0 90px rgba(255, 255, 0, .4);
        }

        .video-card::before {

            content: "動画再生中";

            display: block;

            text-align: center;

            font-size: 1.1rem;

            font-weight: bold;

            margin-bottom: 12px;

            animation:
                rainbow 3s linear infinite;
        }

        @media(max-width:768px) {

            .video-card {

                width: 98%;

                padding: 8px;

                border-radius: 15px;
            }

            .video-card::before {

                font-size: .9rem;
            }
        }

        #startBtn {
            margin: 20px;

            padding: 15px 30px;

            font-size: 1.2rem;

            font-weight: bold;

            border: none;

            border-radius: 999px;

            cursor: pointer;

            color: white;

            background:
                linear-gradient(90deg,
                    #ff00ff,
                    #00ffff);

            box-shadow:
                0 0 20px #ff00ff,
                0 0 40px #00ffff;

            animation:
                pulse 1.5s infinite;
        }

        @keyframes pulse {

            50% {
                transform: scale(1.1);
            }
        }

        /* レスポンシブ */

        .iframe-wrapper {
            display: none;

            position: relative;

            width: 100%;

            aspect-ratio: 16/9;

            overflow: hidden;

            border-radius: 15px;
        }

        .iframe-wrapper iframe {

            position: absolute;

            inset: 0;

            width: 100%;

            height: 100%;

            border: none;
        }

        /* スマホ */

        @media(max-width:600px) {

            .video-card {
                padding: 8px;
                border-radius: 12px;
            }

            h1 {
                margin-top: 15px;
            }
        }
    </style>
</head>

<body>

    <h1 class="imo-title">
        <span>芋</span>
        <span>芋</span>
        <span>無</span>
        <span>限</span>
    </h1>

    <div class="video-card">
        <button id="startBtn">
            ▶ 再生
        </button>

        <div class="iframe-wrapper" id="playerContainer">
        </div>

    </div>

</body>
<script>
    let wakeLock = null;

    // スリープ防止（Screen Wake Lock API）
    const requestWakeLock = async () => {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }
    };

    // 画面が戻った時にWake Lockを再取得
    const handleVisibilityChange = async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    };

    document.addEventListener('visibilitychange', handleVisibilityChange);

    document
        .getElementById("startBtn")
        .addEventListener(
            "click",
            async () => {
                document
                    .getElementById(
                        "playerContainer"
                    )
                    .style.display = "flex";
                document
                    .getElementById(
                        "playerContainer"
                    )
                    .innerHTML = `
        <iframe
            src="https://www.youtube.com/embed/qSZpqX4EB7s?autoplay=1&playsinline=1&loop=1&playlist=qSZpqX4EB7s"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
        `;

                document
                    .getElementById(
                        "startBtn"
                    )
                    .style.display = "none";

                // スリープ防止を有効化
                await requestWakeLock();

                // メディアセッションの設定（バックグラウンド再生の安定化と通知センター制御）
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: '芋芋無限',
                        artist: '芋芋',
                        artwork: [
                            { src: 'https://placehold.jp/500x500.png?text=芋', sizes: '500x500', type: 'image/png' }
                        ]
                    });

                    // 再生/一時停止などのハンドラを設定（iframe内は直接制御できないが、OSに再生中であることを伝える）
                    navigator.mediaSession.setActionHandler('play', () => { /* YouTubeのiframe内を操作するのは困難だが、再生指示は受け取れる */ });
                    navigator.mediaSession.setActionHandler('pause', () => { /* 同上 */ });
                }
            }
        );

</script>

</html>
