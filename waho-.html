<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>わホー</title>
    <style>
        /* 1. ご提示いただいたレスポンシブCSSをそのまま適用 */
        .iframe-wrapper {
            display: flex;
            justify-content: center; /* 左右の中央揃え */
            align-items: center;    /* 上下の中央揃え */
            position: relative;
            width: 100%;
            margin: 0 auto;
            aspect-ratio: 16 / 9; /* 縦横比（16:9の場合） */
            background: #000;      /* 動画読み込み前の黒背景 */
        }

        .iframe-wrapper iframe {
            display: flex;
            justify-content: center; /* 左右の中央揃え */
            align-items: center;    /* 上下の中央揃え */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
<div class="iframe-wrapper">
  <iframe src="https://www.youtube.com/embed/8VAoV95fiQo?start=200" frameborder="0" allowfullscreen></iframe>
</div>
</body>
</html>
