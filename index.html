<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>芋芋</title>
    <style>
        /* 1. ご提示いただいたレスポンシブCSSをそのまま適用 */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            max-width: 1515px; /* 最大幅の制限（お好みで外してもOKです） */
            margin: 0 auto;
            aspect-ratio: 16 / 9; /* 縦横比（16:9の場合） */
            background: #000;      /* 動画読み込み前の黒背景 */
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
<div class="iframe-wrapper">
  <iframe src="https://www.youtube.com/embed/QgwtzjC69Pk" frameborder="0" allowfullscreen></iframe>
</div>
</body>
</html>
