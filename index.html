<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube 連続再生</title>
    <style>
        /* 画面サイズに合わせるレスポンシブ設定 */
        .video-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- プレイヤーがここに生成されます -->
        <div id="player"></div>
    </div>

    <script>
        // YouTube Iframe API の読み込み
        var tag = document.createElement('script');
        tag.src = "https://youtube.com";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'QgwtzjC69Pk', // 1本目の動画ID
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 状態変更の検知
        function onPlayerStateChange(event) {
            // 再生終了（ENDED）になったら
            if (event.data === YT.PlayerState.ENDED) {
                // 2本目の動画を読み込んで再生
                player.loadVideoById('qSZpqX4EB7s'); 
            }
        }
    </script>

</body>
</html>
